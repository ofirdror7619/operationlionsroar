<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation Lion's Roar</title>
    <link rel="icon" type="image/png" href="/assets/images/game/grenade.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Chakra+Petch:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --app-bg-1: #0a1118;
        --app-bg-2: #161108;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(1100px 700px at 14% 18%, rgba(42, 78, 112, 0.32), transparent 62%),
          radial-gradient(900px 640px at 84% 82%, rgba(150, 103, 36, 0.24), transparent 60%),
          linear-gradient(145deg, var(--app-bg-1), var(--app-bg-2));
        overflow: hidden;
        font-family: "Chakra Petch", "Segoe UI", sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
