<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation Lion's Roar</title>
    <link rel="icon" type="image/png" href="/assets/images/game/grenade.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;700;800&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --app-bg-1: #041015;
        --app-bg-2: #071a1f;
      }

      html,

        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(1100px 700px at 14% 18%, rgba(39, 161, 147, 0.34), transparent 62%),

          linear-gradient(145deg, var(--app-bg-1), var(--app-bg-2));
        overflow: hidden;
        font-family: "Share Tech Mono", "Segoe UI", sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

    </style>
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
